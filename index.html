<body style="background-color: #333; color: white; font-size: 18px;">
<h1>LANDING DISTANCE CALCULATOR</h1>
<!-- Pierwsza linia: opcje -->
<div class="row">
<div class="form-group">
<label for="aircraft">AIRCRAFT</label>
<select id="aircraft" style=";background-color: #e6e6e6;">
<option value="VT-GSH">VT-GSH</option>
<option value="VT-GSI">VT-GSI</option>
<option value="VT-GSJ">VT-GSJ</option>
<option value="VT-GSK">VT-GSK</option>
<option value="VT-GSM">VT-GSM</option>
<option value="VT-GSU">VT-GSU</option>
</select>
</div>
<div class="form-group">
<label for="runwayCondition">RWYCC </label>
<select id="runwayCondition" style=";background-color: #e6e6e6;">
<option value="dry">Dry</option>
<option value="5">5</option>
<option value="4">4</option>
<option value="3">3</option>
<option value="2">2</option>
<option value="1">1</option>
</select>
</div>
<div class="form-group">
<label for="flaps">FLAPS</label>
<select id="flaps" style=";background-color: #e6e6e6;">
<option value="flap5">Flap 5</option>
<option value="flapfull">Flap Full</option>
</select>
</div>
<div class="form-group">
<label for="icing">ICEING</label>
<select id="icing" style=";background-color: #e6e6e6;">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>
</div>
<div class="form-group">
<label for="runwayDistance">RWY DISTANCE (m):</label>
<input id="runwayDistance" inputmode="numeric" style=";background-color: #e6e6e6;" type="tel"/>
</div>
</div>
<!-- Druga linia: dane -->
<div class="row">
<div class="form-group">
<label for="weight">WEIGHT (kg)</label>
<input id="weight" inputmode="numeric" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="rwyDir">RWY DIR:</label>
<input id="rwyDir" inputmode="numeric" name="rwyDir" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="windDir">WIND DIR:</label>
<input id="windDir" inputmode="numeric" name="windDir" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="windSpeed">WIND (kt):</label>
<input id="windSpeed" inputmode="numeric" name="windSpeed" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="gust">GUST (kt):</label>
<input id="gust" inputmode="numeric" name="gust" style=";background-color: #e6e6e6;" type="tel" value="0"/>
</div>
<div class="form-group">
<label for="elevation">ELEV (ft):</label>
<input id="elevation" inputmode="numeric" name="elevation" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="temp">TEMP (°C):</label>
<input id="temp" inputmode="numeric" name="temp" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="suggestedVap">Sugg Vap:</label>
<input id="suggestedVap" inputmode="numeric" name="suggestedVap" readonly="" style=";background-color: #cccccc;" type="tel"/>
</div>
<div class="form-group">
<label for="vapCorrection">Vap Corr:</label>
<input id="vapCorrection" inputmode="numeric" name="vapCorrection" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-group">
<label for="slope">SLOPE (%):</label>
<input id="slope" inputmode="numeric" step="0.1" style=";background-color: #e6e6e6;" type="tel" value="0"/>
</div>
<div class="form-group">
<label for="revInop">REV INOP</label>
<input id="revInop" style=";background-color: #e6e6e6;" type="checkbox"/>
</div>
<div class="form-group">
<button id="calculateButton" onclick="calculateAll()">CALCULATE</button>
</div>
<!-- Sekcja wyników jako kolumny -->
<div class="row landing-fo-wrapper">
<div class="label-col">
<h2>LANDING DISTANCE</h2>
</div>
<div class="form-col">
<label for="maxman">MAX MAN</label>
<input class="data-input" id="maxman" inputmode="numeric" readonly="" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-col">
<label for="high">HI</label>
<input class="data-input" id="high" inputmode="numeric" readonly="" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-col">
<label for="med">MED</label>
<input class="data-input" id="med" inputmode="numeric" readonly="" style=";background-color: #e6e6e6;" type="tel"/>
</div>
<div class="form-col">
<label for="lo">LO</label>
<input class="data-input" id="lo" inputmode="numeric" readonly="" style=";background-color: #e6e6e6;" type="tel"/>
</div>
</div>
</div>

function calculateSuggestedVap() {
  const windDir = parseFloat(document.getElementById("windDir").value);
  const windSpeed = parseFloat(document.getElementById("windSpeed").value);
  const rwyDir = parseFloat(document.getElementById("rwyDir").value);
  const gust = parseFloat(document.getElementById("gust").value);
  const icingElement = document.getElementById("icing");
  const icing = icingElement && icingElement.value.toUpperCase() === "YES";

  if (isNaN(windDir) || isNaN(windSpeed) || isNaN(rwyDir)) return;

  let angleDiff = Math.abs(windDir - rwyDir) % 360;
  if (angleDiff > 180) angleDiff = 360 - angleDiff;
  const angleRad = angleDiff * Math.PI / 180;

  let headwind = windSpeed * Math.cos(angleRad);
  headwind = Math.max(0, headwind);

  let gustCorrection = gust - windSpeed;
  if (gustCorrection < 0) gustCorrection = 0;

  let vap = (headwind / 2) + gustCorrection;
  vap = Math.round(vap);

  if (icing) {
    vap = Math.min(20, Math.max(0, vap));
  } else {
    if (vap < 5) vap = 5;
    if (vap > 20) vap = 20;
  }

  document.getElementById("suggestedVap").value = vap;
}


// Automatyczne liczenie Suggested Vap przy zmianie danych
["windDir", "windSpeed", "rwyDir", "gust"].forEach(id => {
  document.getElementById(id).addEventListener("input", calculateSuggestedVap);
});
</script>
<script>
function calculateAll() {
  const weight = parseFloat(document.getElementById("weight").value);
  const elevation = parseFloat(document.getElementById("elevation").value);
  const oat = parseFloat(document.getElementById("temp").value);
  const isaDev = oat - 15;
  const windDir = parseFloat(document.getElementById("windDir").value);
  const windSpeed = parseFloat(document.getElementById("windSpeed").value);
  const gust = parseFloat(document.getElementById("gust").value);
  const rwyDir = parseFloat(document.getElementById("rwyDir").value);
  const slope = parseFloat(document.getElementById("slope").value);
  const vapCorr = parseFloat(document.getElementById("vapCorrection").value);
  const revInop = document.getElementById("revInop").checked;

  const condition = document.getElementById("runwayCondition").value.toUpperCase();
  const flap = document.getElementById("flaps").value === "flap5" ? "5" : "FULL";
  const ice = document.getElementById("icing").value.toUpperCase();

  const brakeModes = ["MAX MAN", "HIGH", "MEDIUM", "LOW"];
  const outputFields = {
    "MAX MAN": "maxman",
    "HIGH": "high",
    "MEDIUM": "med",
    "LOW": "lo"
  };

  const windComponent = (() => {
    const maxWind = Math.max(windSpeed, gust);
    const angle = Math.abs(windDir - rwyDir);
    const radians = angle * Math.PI / 180;
    return Math.round(maxWind * Math.cos(radians));
  })();

  brakeModes.forEach(mode => {
    const data = landingData?.[condition]?.[flap]?.[ice]?.[mode];
    if (!data) return;

    let distance = data.refDistance;

    if (weight < data.refWeight) {
      distance -= (data.refWeight - weight) * data.weightBelow;
    } else {
      distance += (weight - data.refWeight) * data.weightAbove;
    }

    distance += elevation * data.elevation;

    if (isaDev < 0) {
      distance += isaDev * data.tempBelowISA;
    } else {
      distance += isaDev * data.tempAboveISA;
    }

    if (windComponent > 0) {
      distance += windComponent * data.headwind;
    } else {
      distance += Math.abs(windComponent) * data.tailwind;
    }

    distance += slope > 0 ? slope * data.slopeUp : (-slope) * data.slopeDown;

    distance += vapCorr * data.vap;

    if (revInop) {
      distance += data.revInop;
    }

    const outputId = outputFields[mode];
    document.getElementById(outputId).value = Math.round(distance);
    const runwayDistance = parseFloat(document.getElementById("runwayDistance").value);
    const field = document.getElementById(outputId);
    if (!isNaN(runwayDistance)) {
      if (distance <= runwayDistance) {
        field.style.backgroundColor = "#aaffaa"; // zielony
      } else {
        field.style.backgroundColor = "#ffaaaa"; // czerwony
      }
    } else {
      field.style.backgroundColor = ""; // brak koloru jeśli brak danych
    }

  });
}
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
  const fields = [
    "weight", "elevation", "temp", "windDir", "windSpeed", "gust",
    "rwyDir", "slope", "vapCorrection", "runwayLength",
    "runwayCondition", "flaps", "icing", "revInop"
  ];

  // Wczytaj dane z localStorage
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    const saved = localStorage.getItem("ld_" + id);
    if (saved !== null) {
      if (el.type === "checkbox") {
        el.checked = saved === "true";
      } else {
        el.value = saved;
      }
    }
  });

  // Zapisuj dane przy każdej zmianie
  fields.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener("change", () => {
      if (el.type === "checkbox") {
        localStorage.setItem("ld_" + id, el.checked);
      } else {
        localStorage.setItem("ld_" + id, el.value);
      }
    });
  });
});
</script>
<script>
function monitorWindWarnings() {
  const wind = parseFloat(document.getElementById("windSpeed").value);
  const windDir = parseFloat(document.getElementById("windDir").value);
  const rwyDir = parseFloat(document.getElementById("rwyDir").value);
  const rwycc = document.getElementById("runwayCondition").value.toUpperCase();
  const warningBox = document.getElementById("warnings");

  if (isNaN(wind) || isNaN(windDir) || isNaN(rwyDir)) {
    warningBox.innerHTML = "";
    return;
  }

  let angleDiff = Math.abs(windDir - rwyDir) % 360;
  if (angleDiff > 180) angleDiff = 360 - angleDiff;
  const angleRad = angleDiff * Math.PI / 180;

  const tailwind = Math.round(-wind * Math.cos(angleRad)); // tailwind if positive
  const crosswind = Math.round(Math.abs(wind * Math.sin(angleRad)));

  let warnings = [];

  if (tailwind > 10) {
    warnings.push("⚠️ TAIL WIND MORE THAN 10 KT");
  }

  const crosswindLimits = {
    "DRY": 38, "5": 31, "4": 20, "3": 15, "2": 12, "1": 8
  };

  const limit = crosswindLimits[rwycc];
  if (limit !== undefined && crosswind > limit) {
    warnings.push(`⚠️ CROSSWIND EXCEEDS LIMIT FOR RWYCC ${rwycc} (${crosswind} kt > ${limit} kt)`);
  }

  warningBox.innerHTML = warnings.join("<br>");
}

window.addEventListener("DOMContentLoaded", function () {
  ['windSpeed', 'windDir', 'rwyDir', 'runwayCondition'].forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.addEventListener("input", monitorWindWarnings);
      el.addEventListener("change", monitorWindWarnings);
    }
  });
});
</script>

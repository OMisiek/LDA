<body>
<div class="inputs">
<h1>Landing Distance Calculator</h1>
<div class="form-row">
<label for="aircraft">Aircraft:</label>
<select id="aircraft">
<option value="VT-GSH">VT-GSH</option>
<option value="VT-GSI">VT-GSI</option>
<option value="VT-GSJ">VT-GSJ</option>
<option value="VT-GSU">VT-GSU</option>
<option value="VT-GSK">VT-GSK</option>
<option value="VT-GSM">VT-GSM</option>
</select>
</div>
<div class="form-row">
<label for="runwayCondition">Runway Condition:</label>
<select id="runwayCondition">
<option value="DRY">Dry</option>
<option value="5">5</option>
<option value="4">4</option>
<option value="3">3</option>
<option value="2">2</option>
<option value="1">1</option>
</select>
</div>
<div class="form-row">
<label for="flapSetting">Flap Setting:</label>
<select id="flapSetting">
<option value="5">Flap 5</option>
<option value="FULL">Flap Full</option>
</select>
</div>
<div class="form-row">
<label for="icing">ICEING:</label>
<select id="icing">
<option value="NO">No</option>
<option value="YES">Yes</option>
</select>
</div>
<div class="form-row">
<label for="runwayDistance">Runway Distance (m):</label>
<input id="runwayDistance" type="number"/>
</div>
<div class="form-row">
<label for="weight">Landing Weight (kg):</label>
<input id="weight" type="number"/>
</div>
<div class="form-row">
<label for="elevation">Runway Elevation (ft):</label>
<input id="elevation" type="number"/>
</div>
<div class="form-row">
<label for="runwayDir">Runway Direction:</label>
<input id="runwayDir" type="number"/>
</div>
<div class="form-row">
<label for="windDir">Wind Direction:</label>
<input id="windDir" type="number"/ oninput="calculateSuggestedVap()">
</div>
<div class="form-row">
<label for="windSpeed">Wind Speed (kt):</label>
<input id="windSpeed" type="number"/ oninput="calculateSuggestedVap()"><label for="gust" style="margin-left: 20px; margin-right: 10px; font-weight: bold; font-size: 20px; color: white;">Gust</label><input id="gust" style="width: 60px; font-size: 18px;" type="number"/ oninput="calculateSuggestedVap()">
</div>
<div class="form-row">
<label for="temperature">Temperature (°C):</label>
<input id="temperature" type="number"/>
</div>
<div class="form-row">
<label for="vap">Vap Correction (kt):</label>
<input id="vap" type="number"/><label for="suggestedVap" style="margin-left: 20px; margin-right: 10px; font-weight: bold; font-size: 20px; color: white;">Suggested VAP</label><input id="suggestedVap" style="width: 60px; font-size: 18px;" type="number"/ readonly>
</div>
<div class="form-row">
<label for="slope">Slope (%):</label>
<input id="slope" step="0.1" type="number"/>
</div>
<div class="form-row">
<label for="revInop">Reverse Inoperative:</label>
<input id="revInop" type="checkbox"/>
</div>
<br/>
<button onclick="calculate()">CALCULATE</button>
</div>
<div class="results">
<h2>Result</h2>
<table border="1">
<tr><th>Configuration</th><th>Landing Distance (m)</th><th>FO LIMIT</th></tr>
<tr><td>MAX MAN</td><td class="result" id="MAX MAN">–</td><td class="fo-limit" id="MAX MAN-FO">–</td></tr>
<tr><td>HIGH</td><td class="result" id="HIGH">–</td><td class="fo-limit" id="HIGH-FO">–</td></tr>
<tr><td>MEDIUM</td><td class="result" id="MEDIUM">–</td><td class="fo-limit" id="MEDIUM-FO">–</td></tr>
<tr><td>LOW</td><td class="result" id="LOW">–</td><td class="fo-limit" id="LOW-FO">–</td></tr>
</table>
<p class="warning" id="windWarning"></p>
<p class="warning" id="crosswindWarning"></p>

<script>

function calculateSuggestedVap() {
    const windSpeed = parseFloat(document.getElementById("windSpeed").value) || 0;
    const gust = parseFloat(document.getElementById("gust").value) || 0;
    const windDir = parseFloat(document.getElementById("windDir").value) || 0;
    const rwyDir = parseFloat(document.getElementById("rwyDir").value) || 0;

    let headwind = windSpeed * Math.cos((windDir - rwyDir) * Math.PI / 180);
    headwind = Math.max(0, Math.ceil(headwind));

    let gustDiff = Math.max(0, gust - headwind);

    let suggestedVap = headwind / 2 + gustDiff;
    suggestedVap = Math.min(20, Math.round(suggestedVap));

    document.getElementById("suggestedVap").value = suggestedVap;
}

const aircraft_NON_IGAP = ["VT-GSK", "VT-GSM"];

function getBaseDataFor(aircraft) {
  return aircraft_NON_IGAP.includes(aircraft) ? baseData_NON_IGAP : baseData_IGAP;
}

    const deltaWeight = weight - data.refWeight;
    if (deltaWeight < 0) {
      ldr += deltaWeight * data.weightBelow;

    }

    "weight", "elevation", "runwayDir", "windDir", "windSpeed",
    "temperature", "vap", "slope", "revInop"
  ];
  ids.forEach(id => {
    const el = document.getElementById(id);
    const saved = localStorage.getItem(id);
    if (saved !== null) {
      if (el.type === "checkbox") {
        el.checked = saved === "true";
      } else {
        el.value = saved;
      }
    }
  });
};

function saveInputsToLocalStorage() {
  const ids = [
    "aircraft", "runwayCondition", "flapSetting", "icing", "runwayDistance",
    "weight", "elevation", "runwayDir", "windDir", "windSpeed",
    "temperature", "vap", "slope", "revInop"
  ];
  ids.forEach(id => {
    const el = document.getElementById(id);
    localStorage.setItem(id, el.type === "checkbox" ? el.checked : el.value);
  });
}

document.addEventListener("DOMContentLoaded", function () {
  const inputs = Array.from(document.querySelectorAll("input, select"));
  inputs.forEach((el, index) => {
    el.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        e.preventDefault();
        const next = inputs[index + 1];
        if (next) next.focus();
      }
    });
  });
});
// Suggested VAP Calculation
function calculateSuggestedVap() {
  const windDir = parseFloat(document.getElementById("windDir").value);
  const windSpeed = parseFloat(document.getElementById("windSpeed").value);
  const gust = parseFloat(document.getElementById("gust").value);
  const rwyDir = parseFloat(document.getElementById("rwyDir").value);

  if (isNaN(windDir) || isNaN(windSpeed) || isNaN(gust) || isNaN(rwyDir)) {
    document.getElementById("suggestedVap").value = "";
    return;
  }

  const windAngle = (windDir - rwyDir) * Math.PI / 180;
  let headwind = windSpeed * Math.cos(windAngle);

  if (headwind < 0) headwind = 0; // używamy tylko składowej czołowej

  const headwindRounded = Math.ceil(headwind); // zaokrąglanie w górę
  const gustDiff = gust - headwindRounded;

  let suggested = Math.round((headwindRounded / 2) + gustDiff);

  if (suggested > 20) suggested = 20;
  if (suggested < 0) suggested = 0;

  document.getElementById("suggestedVap").value = suggested;
}


// Nasłuchiwanie zmian pól
document.getElementById("windDir").addEventListener("input", calculateSuggestedVap);
document.getElementById("windSpeed").addEventListener("input", calculateSuggestedVap);
document.getElementById("gust").addEventListener("input", calculateSuggestedVap);
document.getElementById("rwyDir").addEventListener("input", calculateSuggestedVap);


function updateSuggestedVap() {
  const windSpeed = parseFloat(document.getElementById("windSpeed").value);
  const windDir = parseFloat(document.getElementById("windDir").value);
  const rwyDir = parseFloat(document.getElementById("rwyDir").value);
  const gust = parseFloat(document.getElementById("gust").value);

  if (isNaN(windSpeed) || isNaN(windDir) || isNaN(rwyDir) || isNaN(gust)) {
    document.getElementById("suggestedVap").value = "";
    return;
  }

  const windAngle = Math.abs(windDir - rwyDir);
  const headwindComp = Math.ceil(windSpeed * Math.cos(windAngle * Math.PI / 180));
  const gustDelta = gust - headwindComp;
  let suggested = Math.ceil(0.5 * headwindComp + gustDelta);

  if (suggested < 0) suggested = 0;
  if (suggested > 20) suggested = 20;

  document.getElementById("suggestedVap").value = suggested;
}
